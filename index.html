<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5분자동화 올인원 ver3. | 인플즈메리</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Malgun Gothic',sans-serif;background:#F5F3EF;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#DDD;border-radius:3px}
button{cursor:pointer}

/* ============= 모바일 최적화 (768px 이하) ============= */
@media (max-width: 768px) {
  /* 1. 모든 multi-column grid를 1컬럼으로 자동 변환 */
  div[style*="grid-template-columns"]{
    grid-template-columns: 1fr !important;
  }

  /* 2. 미리보기 박스(620px 고정) → 화면에 맞춤 */
  div[style*="width: 620px"]{
    width: 100% !important;
    max-width: 100% !important;
  }

  /* 3. 미리보기 박스 내부 패딩 줄이기 (32px 36px → 18px 16px) */
  div[style*="padding: 32px 36px"]{
    padding: 18px 16px !important;
  }

  /* 4. 상단 헤더 패딩 줄이기 (12px 20px → 10px 12px) */
  div[style*="padding: 12px 20px"]{
    padding: 10px 12px !important;
  }

  /* 5. 탭 네비 영역 - 가로 스크롤 허용 (6개 탭이 안 잘리게) */
  div[style*="padding: 0px 18px"][style*="display: flex"]{
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap !important;
    padding: 0 8px !important;
  }
  div[style*="padding: 0px 18px"][style*="display: flex"] button{
    flex-shrink: 0 !important;
    white-space: nowrap;
  }

  /* 6. 좌우 큰 padding 줄이기 (20px → 12px) */
  div[style*="padding: 5px 20px"]{
    padding: 5px 12px !important;
  }

  /* 7. 본문 컨테이너 padding 줄이기 */
  div[style*="padding: 16px;"]:not([style*="grid"]):not([style*="background"]){
    padding: 10px !important;
  }

  /* 8. 테이블 폰트 줄이고 가로 스크롤 보장 */
  table{
    font-size: 10.5px !important;
  }
  div[style*="overflow-x"]{
    -webkit-overflow-scrolling: touch;
  }

  /* 9. 컬러 프리셋 버튼 줄바꿈 유지 */
  div[style*="flex-wrap: wrap"]{
    justify-content: flex-start !important;
  }

  /* 10. body 폰트 사이즈 보정 */
  body{
    font-size: 13px;
    -webkit-text-size-adjust: 100%;
  }
}

/* ============= 작은 모바일 (480px 이하) - 더 콤팩트 ============= */
@media (max-width: 480px) {
  div[style*="padding: 18px 16px"]{
    padding: 14px 12px !important;
  }

  /* 헤더 로고 아이콘 약간 줄임 */
  div[style*="width: 36px"][style*="height: 36px"][style*="border-radius: 8px"]{
    width: 32px !important;
    height: 32px !important;
  }
}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#888"><div style="font-size:32px">⚙️</div><div style="font-size:14px;font-weight:600">도구 불러오는 중...</div><div style="font-size:11px">처음 열 때 5~10초 정도 걸려요</div></div></div>
<script type="text/babel">
const {useState,useRef}=React;
const COLOR_PRESETS=[{name:"로즈",v:"#C4375A"},{name:"네이비",v:"#1E4D8C"},{name:"그린",v:"#2D7A4F"},{name:"버건디",v:"#7D1935"},{name:"퍼플",v:"#6B3FA0"},{name:"틸",v:"#0B7A7E"},{name:"오렌지",v:"#C24A0C"},{name:"다크",v:"#2A2A2A"}];
const INIT_PRODUCTS=[];
const calcM=(p)=>{const gp=+p.groupBuyPrice||0,wp=+p.wholesalePrice||0,smr=+p.sellerMarginRate||0;const total=gp-wp,totalRate=gp>0?(total/gp*100):0;const sellerAmt=Math.round(total*smr/100),myAmt=total-sellerAmt;return{total,totalRate,sellerAmt,myAmt,supplyPrice:gp-sellerAmt};};
const fmt=(n)=>Number(n||0).toLocaleString()+"원";
const pct=(n)=>Number(n||0).toFixed(1)+"%";
const nextId=(prods)=>{const ns=prods.map(p=>parseInt(p.id.replace(/\D/g,""))||0);return`P${String((ns.length>0?Math.max(...ns):0)+1).padStart(3,"0")}`;};
const TERMS=["타 공구와 동시 진행은 어려울 수 있으며, 단독 공구로 진행되면 기간은 셀러 일정에 맞춰 조율됩니다.","공구 진행 시 상세페이지와 함께 판매 링크를 제공하며, 셀러 계정 혹은 콘텐츠 내에서 사용됩니다.","정산은 공구 종료 후 7일 이내 정산을 기본으로 하되, 협의 시 조정 가능합니다.","배송은 수량과 시즌에 따라 달라질 수 있으며, 운영 이슈 발생 시 별도 안내드립니다.","모든 진행사항은 담당 MD가 1:1로 팔로업하며, 수정 요청 사항도 함께 관리합니다."];

function App(){
  const [tab,setTab]=useState("master");
  const [products,setProducts]=useState(INIT_PRODUCTS);
  const [ac,setAc]=useState("#C4375A");
  const [form,setForm]=useState({md:"",brand:"",keyword:"",product:"",channel:"",shipping:"",note:"",points:["","","","",""]});
  const [selIds,setSelIds]=useState(["","","","","","","",""]);
  const [productImages,setProductImages]=useState([]);
  const [dmChannel,setDmChannel]=useState("insta");
  const [hookSentence,setHookSentence]=useState("");
  const [greeting,setGreeting]=useState("안녕하세요. oo님");
  const [copied,setCopied]=useState({});
  const [saving,setSaving]=useState({pdf:false,png:false});
  const [toast,setToast]=useState("");
  const [newP,setNewP]=useState({brand:"",name:"",onlinePrice:"",groupBuyPrice:"",wholesalePrice:"",sellerMarginRate:"75",note:""});
  const [editRate,setEditRate]=useState({});
  const [sellers,setSellers]=useState([]);
  const [newSeller,setNewSeller]=useState({date:new Date().toISOString().slice(0,10),name:"",insta:"",item:"",feature:"",status:"대기",account:"MD계정",method:"인스타",methodEtc:""});
  const [sellerSearch,setSellerSearch]=useState({text:"",status:""});
  const xlsxSellerRef=useRef(null);
  const [editRow,setEditRow]=useState(null); // {id, brand, name, onlinePrice, groupBuyPrice, wholesalePrice, sellerMarginRate, note}
  const [optBase,setOptBase]=useState({brand:"",baseName:"",onlinePrice:"",groupBuyPrice:"",baseMargin:"",sellerMarginRate:"75"});
  const [optRows,setOptRows]=useState(Array.from({length:11},(_,i)=>({id:i,name:"",onlinePrice:"",optionPrice:"",bonusMargin:"",selected:false})));
  const [optProds,setOptProds]=useState([]);
  const proposalRef=useRef(null);
  const imgInputRef=useRef(null);
  const xlsxInputRef2=useRef(null);

  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(""),2600);};
  const npC=calcM({groupBuyPrice:newP.groupBuyPrice,wholesalePrice:newP.wholesalePrice,sellerMarginRate:newP.sellerMarginRate});
  const selProds=[...selIds.map(id=>id?products.find(p=>p.id===id):null).filter(Boolean),...optProds];
  const activePoints=form.points.filter(p=>p.trim());
  const ptList=activePoints.map((p,i)=>`${i+1}. ${p}`).join("\n");
  const hookLine=hookSentence.trim()?hookSentence.trim()+"\n\n":"";

  const DM={
    insta:{
      v1:`${hookLine}${greeting}\n셀러브리티 MD ${form.md}입니다.\n\n${greeting}의 피드를 보고\n제가 소개해드리고 싶은 상품과 잘 맞으실 것 같아 연락드리게 되었습니다.\n\n이번에 소개드리고 싶은 상품은\n${form.brand} / ${form.product} 입니다.\n\n이 제품의 핵심 포인트는 아래와 같습니다.\n\n${ptList}\n\n혹시 보시고 제품에 관심이 있으시다면\n편하게 답장 주세요.\n간단히 관심 있다고만 말씀 주셔도 괜찮습니다 :)\n원하시면 제안서와 함께 자세히 안내드리겠습니다.\n\n오늘 하루도 즐거운 하루가 되시기를 바라겠습니다!\n감사합니다 :-)`,
      v2:`${hookLine}${greeting}\n셀러브리티 MD ${form.md}입니다.\n\n${greeting}의 피드를 보고\n제가 소개해드리고 싶은 상품과 잘 맞으실 것 같아 조심스럽게 연락드리게 되었습니다.\n\n이번에 소개드리고 싶은 상품은\n${form.brand} / ${form.product} 입니다.\n\n이 제품의 핵심 포인트는 아래와 같습니다.\n\n${ptList}\n\n혹시 제품에 관심 있으시면\n편하게 답장 주세요 :)\n간단히 관심 있다고만 말씀 주셔도 괜찮습니다.\n원하시면 제안서와 함께 자세히 안내드리겠습니다.\n\n오늘도 좋은 하루 보내세요!\n감사합니다.`,
    },
    kakao:{
      v1:`${hookLine}안녕하세요! 셀러브리티 MD ${form.md}예요 😊\n\n${form.brand} ${form.product} 공구 제안드리려고 연락드렸어요~\n\n${activePoints.slice(0,3).map(p=>`✅ ${p}`).join("\n")}\n\n혹시 관심 있으시면 편하게 답장 주세요!\n제안서도 바로 드릴게요 🙏`,
      v2:`${hookLine}안녕하세요 😊 저 셀러브리티 MD ${form.md}인데요~\n\n다름이 아니라 ${form.brand} / ${form.product} 공구 제안드려보고 싶어서요!\n\n${activePoints.slice(0,2).map(p=>`✨ ${p}`).join("\n")}\n\n간단히 관심 있다고만 해주셔도 되고요,\n제안서 PDF로 깔끔하게 보내드릴게요 💌\n\n좋은 하루 보내세요 🌸`,
    },
    email:{
      v1:`제목: [셀러브리티] ${form.brand} / ${form.product} 공동구매 제안드립니다\n\n안녕하세요.\n셀러브리티 MD ${form.md}입니다.\n\n${form.brand}의 ${form.product} 관련하여 공동구매 진행을 제안드리고자 연락드렸습니다.\n\n━━━━━━━━━━━━━━━━━━━━\n📌 제품 핵심 포인트\n━━━━━━━━━━━━━━━━━━━━\n${ptList}\n━━━━━━━━━━━━━━━━━━━━\n\n자세한 가격 조건 및 진행 방식은 첨부된 제안서 PDF를 확인해 주시기 바랍니다.\n\n관심이 있으시다면 편하게 회신 주세요.\n\n감사합니다.\n셀러브리티 MD ${form.md} 드림`,
      v2:`제목: ${form.brand} ${form.product} 공구 제안 — ${form.md} MD\n\n안녕하세요! 셀러브리티 MD ${form.md}입니다 😊\n\n다름이 아니라 ${form.brand} / ${form.product} 공동구매 제안을 드리고 싶어서 연락드렸어요.\n\n${activePoints.slice(0,3).map(p=>`✅ ${p}`).join("\n")}\n\n상세 내용은 첨부 제안서 PDF를 확인해 주시면 감사하겠습니다!\n\n감사합니다!\n셀러브리티 MD ${form.md}`,
    },
  };

  const saveEdit=()=>{
    if(!editRow)return;
    setProducts(products.map(p=>p.id===editRow.id?{...editRow,onlinePrice:+editRow.onlinePrice||0,groupBuyPrice:+editRow.groupBuyPrice||0,wholesalePrice:+editRow.wholesalePrice||0,sellerMarginRate:+editRow.sellerMarginRate||75}:p));
    setEditRow(null);
    showToast("✅ 수정 완료!");
  };

  const saveSellerExcel=()=>{
    if(!window.XLSX){showToast("❌ 잠시 후 다시 시도해 주세요.");return;}
    const XLSX=window.XLSX;
    const rows=sellers.map(s=>({
      "날짜":s.date,"인플루언서명":s.name,"인스타주소":s.insta,
      "제안아이템":s.item,"특징":s.feature,"제안여부":s.status,"제안계정":s.account,"제안방식":s.method
    }));
    const ws=XLSX.utils.json_to_sheet(rows);
    ws["!cols"]=[{wch:12},{wch:16},{wch:28},{wch:24},{wch:30},{wch:10}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"셀러관리");
    XLSX.writeFile(wb,"5분자동화_셀러관리.xlsx");
    showToast("📥 셀러 목록 저장 완료!");
  };

  const loadSellerExcel=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    if(!window.XLSX){showToast("❌ 잠시 후 다시 시도해 주세요.");return;}
    const XLSX=window.XLSX;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"binary"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws);
        const loaded=rows.map((r,i)=>({
          id:Date.now()+i,
          date:r["날짜"]||"",name:r["인플루언서명"]||"",insta:r["인스타주소"]||"",
          item:r["제안아이템"]||"",feature:r["특징"]||"",status:r["제안여부"]||"대기",account:r["제안계정"]||"MD계정",method:r["제안방식"]||"인스타"
        }));
        setSellers(loaded);
        showToast(`✅ ${loaded.length}명 셀러 불러오기 완료!`);
      }catch{showToast("❌ 파일을 읽을 수 없어요.");}
    };
    reader.readAsBinaryString(file);
    e.target.value="";
  };

  const fallbackCopy=(text,key)=>{const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.top="-9999px";ta.style.left="-9999px";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();try{const ok=document.execCommand("copy");if(ok){setCopied(p=>({...p,[key]:true}));showToast("📋 복사되었습니다!");setTimeout(()=>setCopied(p=>({...p,[key]:false})),2000);}else{showToast("❌ 복사 실패. 직접 선택해 주세요.");}}catch{showToast("❌ 복사 실패. 직접 선택해 주세요.");}document.body.removeChild(ta);};
  const copyText=(text,key)=>{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>{setCopied(p=>({...p,[key]:true}));showToast("📋 복사되었습니다!");setTimeout(()=>setCopied(p=>({...p,[key]:false})),2000);}).catch(()=>{fallbackCopy(text,key);});}else{fallbackCopy(text,key);}};
  const saveRate=(id)=>{if(editRate[id]!==undefined)setProducts(products.map(p=>p.id===id?{...p,sellerMarginRate:+editRate[id]||75}:p));setEditRate(prev=>{const n={...prev};delete n[id];return n;});};
  const loadSrc=(src,chk)=>new Promise((res,rej)=>{if(chk&&chk()){res();return;}const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  const handleSavePNG=async()=>{setSaving(p=>({...p,png:true}));try{await loadSrc("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js",()=>window.html2canvas);const cv=await window.html2canvas(proposalRef.current,{scale:2,backgroundColor:"#fff",useCORS:true});const a=document.createElement("a");a.download=`${form.brand}_제안서.png`;a.href=cv.toDataURL("image/png");a.click();showToast("🖼️ PNG 저장 완료!");}catch{showToast("❌ PNG 저장 실패.");}setSaving(p=>({...p,png:false}));};
  const handleSavePDF=async()=>{setSaving(p=>({...p,pdf:true}));try{
    await loadSrc("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js",()=>window.html2canvas);
    await loadSrc("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",()=>window.jspdf);
    const cv=await window.html2canvas(proposalRef.current,{scale:2,backgroundColor:"#fff",useCORS:true});
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const pw=pdf.internal.pageSize.getWidth();
    const ph=pdf.internal.pageSize.getHeight();
    const margin=6;
    const imgW=pw-(margin*2);
    const imgH=(cv.height*imgW)/cv.width;
    const pageH=ph-(margin*2);
    if(imgH<=pageH){
      pdf.addImage(cv.toDataURL("image/png"),"PNG",margin,margin,imgW,imgH);
    }else{
      let yPos=0;
      let pageNum=0;
      while(yPos<imgH){
        if(pageNum>0)pdf.addPage();
        const sliceH=Math.min(pageH,imgH-yPos);
        const srcY=(yPos/imgH)*cv.height;
        const srcH=(sliceH/imgH)*cv.height;
        const sliceCanvas=document.createElement("canvas");
        sliceCanvas.width=cv.width;
        sliceCanvas.height=srcH;
        const ctx=sliceCanvas.getContext("2d");
        ctx.drawImage(cv,0,srcY,cv.width,srcH,0,0,cv.width,srcH);
        pdf.addImage(sliceCanvas.toDataURL("image/png"),"PNG",margin,margin,imgW,sliceH);
        yPos+=sliceH;
        pageNum++;
      }
    }
    pdf.save(`${form.brand}_제안서.pdf`);
    showToast("📄 PDF 저장 완료!");
  }catch{showToast("❌ PDF 실패. Ctrl+P → PDF 저장 이용해 주세요.");}setSaving(p=>({...p,pdf:false}));};
  const handleImageUpload=(e)=>{const files=Array.from(e.target.files);if(!files.length)return;files.slice(0,2-productImages.length).forEach(f=>{const reader=new FileReader();reader.onload=(ev)=>setProductImages(prev=>[...prev,ev.target.result].slice(0,2));reader.readAsDataURL(f);});e.target.value="";};
  const xlsxInputRef=useRef(null);

  const saveExcel=()=>{
    if(!window.XLSX){showToast("❌ 잠시 후 다시 시도해 주세요.");return;}
    const XLSX=window.XLSX;
    const rows=products.map(p=>{
      const m=calcM(p);
      return{
        "상품ID":p.id,"브랜드명":p.brand,"상품명":p.name,
        "온라인가격":p.onlinePrice,"희망공구가":p.groupBuyPrice,"회사도매가":p.wholesalePrice,
        "원래마진금액":m.total,"원래마진율":Math.round(m.totalRate*10)/10,
        "셀러마진%":p.sellerMarginRate,"셀러마진금액":m.sellerAmt,"내마진금액":m.myAmt,
        "비고":p.note
      };
    });
    const ws=XLSX.utils.json_to_sheet(rows);

      {editRow&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:640,boxShadow:"0 8px 40px rgba(0,0,0,.2)",overflow:"hidden"}}>
            <div style={{background:"#1A2940",color:"#fff",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,fontSize:14}}>✏️ 상품 수정 — {editRow.id}</span>
              <button onClick={()=>setEditRow(null)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
            </div>
            <div style={{padding:"20px"}}>
              <div style={{display:"grid",gridTemplateColumns:"120px 1fr",gap:10,marginBottom:10}}>
                <div><label style={S.lbl}>브랜드명</label><input value={editRow.brand} onChange={e=>setEditRow({...editRow,brand:e.target.value})} style={S.inp}/></div>
                <div><label style={S.lbl}>상품명</label><input value={editRow.name} onChange={e=>setEditRow({...editRow,name:e.target.value})} style={S.inp}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                <div><label style={S.lbl}>온라인 가격</label><input type="number" value={editRow.onlinePrice} onChange={e=>setEditRow({...editRow,onlinePrice:e.target.value})} style={S.inpN}/></div>
                <div><label style={S.lbl}>희망 공구가</label><input type="number" value={editRow.groupBuyPrice} onChange={e=>setEditRow({...editRow,groupBuyPrice:e.target.value})} style={S.inpN}/></div>
                <div><label style={S.lbl}>회사 도매가</label><input type="number" value={editRow.wholesalePrice} onChange={e=>setEditRow({...editRow,wholesalePrice:e.target.value})} style={S.inpN}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"100px 1fr",gap:10,marginBottom:20}}>
                <div><label style={S.lbl}>셀러마진 %</label><input type="number" min="0" max="100" value={editRow.sellerMarginRate} onChange={e=>setEditRow({...editRow,sellerMarginRate:e.target.value})} style={S.inpN}/></div>
                <div><label style={S.lbl}>비고</label><input value={editRow.note} onChange={e=>setEditRow({...editRow,note:e.target.value})} placeholder="예: 세트, 단품, 색상" style={S.inp}/></div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={saveEdit} style={{...S.bP(),flex:1,fontSize:13}}>✅ 저장</button>
                <button onClick={()=>setEditRow(null)} style={{...S.bD(),flex:1,fontSize:13}}>취소</button>
              </div>
            </div>
          </div>
        </div>
      )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
